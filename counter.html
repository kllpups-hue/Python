<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Счётчик с стилизацией</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .counter-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .result {
            font-size: 3rem;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            width: 150px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
            background: radial-gradient(circle, #ff8a00, #e52e71);
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #ffeb3b;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <div class="buttons">
            <button id="btn-minus">−</button>
            <button id="btn-plus">+</button>
        </div>
        <div id="result" class="result">0</div>
        <div id="message" class="message"></div>
    </div>

    <script>
        const resultEl = document.getElementById('result');
        const btnPlus = document.getElementById('btn-plus');
        const btnMinus = document.getElementById('btn-minus');
        const messageEl = document.getElementById('message');

        let count = 0;

        // Функция обновления интерфейса
        function updateUI() {
            resultEl.textContent = count;

            // Изменение фона результата в зависимости от значения
            if (count > 0) {
                resultEl.style.backgroundColor = '#fff35c'; // жёлтый
            } else if (count < 0) {
                resultEl.style.backgroundColor = '#4caf50'; // зелёный
            } else {
                resultEl.style.backgroundColor = '#f44336'; // красный
            }

            // Активация/деактивация кнопок
            btnPlus.disabled = count >= 10;
            btnMinus.disabled = count <= -10;

            // Сообщение при экстремальных значениях
            if (count === 10 || count === -10) {
                messageEl.textContent = 'Вы достигли экстремального значения';
            } else {
                messageEl.textContent = '';
            }
        }

        // Обработчики событий
        btnPlus.addEventListener('click', () => {
            count++;
            updateUI();
        });

        btnMinus.addEventListener('click', () => {
            count--;
            updateUI();
        });

        // Инициализация интерфейса
        updateUI();
    </script>
</body>
</html>
